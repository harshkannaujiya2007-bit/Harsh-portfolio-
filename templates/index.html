<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Harsh | Portfolio</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>

:root{
--bg:#0f2027;
--text:white;
--accent:#00c6ff;
}

.light{
--bg:#f5f5f5;
--text:#111;
--accent:#0077ff;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
color:var(--text);
text-align:center;
transition:0.4s;
overflow:hidden;
}

#particles-js{
position:fixed;
width:100%;
height:100%;
z-index:-1;
}

/* profile */

.container{
padding-top:80px;
}

.profile{
width:170px;
height:170px;
border-radius:50%;
border:5px solid white;
object-fit:cover;
}

.skill{
display:inline-block;
background:var(--accent);
color:black;
padding:10px 20px;
margin:10px;
border-radius:20px;
font-weight:bold;
}

.social{
margin-top:30px;
}

.social a{
font-size:28px;
margin:20px;
color:var(--text);
transition:0.3s;
}

.social a:hover{
transform:scale(1.3);
color:var(--accent);
}

.toggle{
position:fixed;
top:20px;
right:20px;
background:var(--accent);
border:none;
padding:10px 15px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

</style>
</head>

<body>

<div id="particles-js"></div>

<button class="toggle" onclick="toggleMode()">🌙 / ☀️</button>

<div class="container">

<img src="{{ url_for('static', filename='ha_2007.jpg') }}" class="profile">

<h1>Hi, I'm Harsh 👋</h1>

<h2>
<span id="typing"></span>
</h2>

<p style="max-width:600px;margin:auto;">
I am learning Python, programming and web development.
This is my first personal website built using Flask.
I enjoy building technology projects and exploring new ideas.
</p>

<h2>Skills</h2>

<div class="skill">Python</div>
<div class="skill">Web Development</div>
<div class="skill">Technology</div>
<div class="skill">Problem Solving</div>

<div class="social">

<a href="https://instagram.com/_harsh_69_s" target="_blank">
<i class="fab fa-instagram"></i>
</a>

<a href="https://github.com/YOUR_USERNAME" target="_blank">
<i class="fab fa-github"></i>
</a>

<a href="https://twitter.com/YOUR_USERNAME" target="_blank">
<i class="fab fa-x-twitter"></i>
</a>

</div>

</div>

<!-- typing animation library -->
<script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>

<script>

var typed = new Typed("#typing", {
strings:[
"Python Developer",
"Web Developer",
"Technology Enthusiast",
"Future Engineer"
],
typeSpeed:60,
backSpeed:40,
loop:true
});

function toggleMode(){
document.body.classList.toggle("light")
}

</script>

<!-- particles background -->

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<script>

particlesJS("particles-js",{
particles:{
number:{value:80},
size:{value:3},
color:{value:"#00c6ff"},
line_linked:{enable:true},
move:{speed:2}
}
});

</script>

</body>
</html>
